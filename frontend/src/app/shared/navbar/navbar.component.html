<nav class="navbar" [class.scrolled]="scrolled()">
  <div class="navbar__container">
    <a routerLink="/" class="navbar__logo" #logoEl>
      <span class="navbar__logo-dot"></span>
      BE-nurse
    </a>

    <ul class="navbar__links" [class.open]="menuOpen()" #menuList>
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}">Inicio</a></li>
      <li><a routerLink="/informate" routerLinkActive="active">Infórmate</a></li>
      <li><a routerLink="/cuidate" routerLinkActive="active">Cuídate</a></li>
      <li><a routerLink="/realidades" routerLinkActive="active">Realidades</a></li>
      <li><a routerLink="/about" routerLinkActive="active">Contacto</a></li>
    </ul>

    <a routerLink="/chat" class="navbar__cta">
      Chat anónimo
    </a>

    @if (auth.isLoggedIn()) {
      <a routerLink="/admin/contacto" class="navbar__login">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Panel
      </a>
    } @else {
      <a routerLink="/login" class="navbar__login">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Iniciar sesión
      </a>
    }

    <button class="navbar__hamburger" [class.open]="menuOpen()" (click)="toggleMenu()" aria-label="Menú">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>
