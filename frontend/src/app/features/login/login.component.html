<div class="login-page">
  <div class="login-card">
    <div class="login-card__header">
      <a routerLink="/" class="login-card__logo">
        <img src="logo.png" alt="BE nurse" />
      </a>
      <h1>Acceso enfermeros</h1>
      <p>Panel de gestión de BE nurse</p>
    </div>

    <form class="login-form" (ngSubmit)="submit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="tu@be-nurse.es"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      @if (error()) {
        <div class="login-error">{{ error() }}</div>
      }

      <button type="submit" class="btn-primary login-btn" [disabled]="loading()">
        @if (loading()) { Entrando... } @else { Iniciar sesión }
      </button>
    </form>

    <a routerLink="/" class="login-card__back">← Volver a la web</a>
  </div>
</div>
